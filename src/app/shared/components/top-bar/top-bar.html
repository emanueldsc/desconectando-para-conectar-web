<header class="topbar" role="banner">
  <div class="topbar__inner">
    <button
      type="button"
      mat-icon-button
      class="topbar__menu-btn"
      aria-label="Abrir menu de navegacao"
      (click)="openMenu()"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <a routerLink="/public/home" class="topbar__brand">Desconectando para Conectar</a>

    <nav class="topbar__nav" aria-label="Atalhos">
      @for (item of menuItems(); track item.id) {
        @if (item.action === 'logout') {
          <button type="button" class="topbar__nav-action" (click)="selectItem(item)">
            {{ item.label }}
          </button>
        } @else {
          <a [routerLink]="item.route" (click)="selectItem(item)">{{ item.label }}</a>
        }
      }
    </nav>
  </div>
</header>

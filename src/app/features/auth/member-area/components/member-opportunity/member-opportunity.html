<section class="member-opportunity" aria-label="Oportunidade para participar agora">
  <h2>Participar Agora</h2>

  @if (currentOffer(); as offer) {
    <article class="member-opportunity__card">
      <div class="member-opportunity__header">
        <div>
          <p class="member-opportunity__label">Rifa ativa</p>
          <h3>{{ offer.title }}</h3>
        </div>

        @if (hasMultiple()) {
          <div class="member-opportunity__carousel-controls">
            <button type="button" class="member-opportunity__control" (click)="previousOffer()" aria-label="Oferta anterior">
              <mat-icon aria-hidden="true">chevron_left</mat-icon>
            </button>
            <button type="button" class="member-opportunity__control" (click)="nextOffer()" aria-label="Próxima oferta">
              <mat-icon aria-hidden="true">chevron_right</mat-icon>
            </button>
          </div>
        }
      </div>

      <div class="member-opportunity__body">
        <p>{{ offer.description }}</p>

        <div class="member-opportunity__meta">
          <span>Valor do bilhete</span>
          <strong>R$ {{ offer.ticketPrice }}</strong>
        </div>

        <div class="member-opportunity__progress-head">
          <span>Progresso</span>
          <span>{{ offer.progress }}%</span>
        </div>

        <div class="member-opportunity__progress-track" role="progressbar" [attr.aria-valuenow]="offer.progress" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso da rifa">
          <span class="member-opportunity__progress-fill" [style]="progressStyle()"></span>
        </div>

        <button type="button" class="member-opportunity__cta" (click)="participate()">
          Participar
          <mat-icon aria-hidden="true">arrow_forward</mat-icon>
        </button>
      </div>
    </article>
  } @else {
    <article class="member-opportunity__card member-opportunity__empty">
      <p>Não há rifas ativas disponíveis para participar no momento.</p>
    </article>
  }
</section>

<aside class="member-side-menu" aria-label="Menu lateral do membro">
  <nav class="member-side-menu__nav">
    @for (item of items(); track item.label) {
      <button
        type="button"
        class="member-side-menu__item"
        [class.member-side-menu__item--active]="item.active"
        aria-current="page"
      >
        <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </button>
    }
  </nav>
</aside>

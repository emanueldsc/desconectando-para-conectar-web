<div class="member-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="member-modal-title" (click)="cancel.emit()">
  <section class="member-modal" (click)="$event.stopPropagation()">
    <header class="member-modal__header">
      <h3 id="member-modal-title">
        <mat-icon aria-hidden="true">{{ headerIcon() }}</mat-icon>
        {{ title() }}
      </h3>
      <button class="top-button" type="button" aria-label="Fechar" (click)="cancel.emit()">
        <mat-icon aria-hidden="true">close</mat-icon>
      </button>
    </header>

    <form class="member-modal__form" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Nome Completo</span>
        <input type="text" formControlName="fullName" placeholder="Ex: Maria Joaquina" />
        @if (hasError('fullName', 'required')) {
          <small class="member-modal__error">Informe o nome completo.</small>
        }
        @if (hasError('fullName', 'minlength')) {
          <small class="member-modal__error">Use ao menos 3 caracteres.</small>
        }
      </label>

      <label>
        <span>Telefone / Contato</span>
        <input type="tel" formControlName="phone" placeholder="(00) 00000-0000" (input)="onPhoneInput($event)" />
        @if (hasError('phone', 'required')) {
          <small class="member-modal__error">Informe o telefone.</small>
        }
        @if (hasError('phone', 'minlength')) {
          <small class="member-modal__error">Telefone incompleto.</small>
        }
      </label>

      <label>
        <span>Endereço</span>
        <input type="text" formControlName="address" placeholder="Rua, número, complemento..." />
        @if (hasError('address', 'required')) {
          <small class="member-modal__error">Informe o endereço.</small>
        }
      </label>

      @if (!isUsersSection()) {
        <div class="member-modal__users-note">
          <mat-icon aria-hidden="true">confirmation_number</mat-icon>
          <span>{{ memberContextLabel() }}</span>
        </div>
      } @else {
        @if (needsCredentials()) {
          <label>
            <span>E-mail de acesso</span>
            <input type="email" formControlName="email" placeholder="usuario@organizacao.org" />
            @if (hasError('email', 'required')) {
              <small class="member-modal__error">Informe o e-mail.</small>
            }
            @if (hasError('email', 'email')) {
              <small class="member-modal__error">Digite um e-mail válido.</small>
            }
          </label>

          <div class="member-modal__grid">
            <label>
              <span>Senha</span>
              <input type="password" formControlName="password" placeholder="Mínimo de 8 caracteres" />
              @if (hasError('password', 'required')) {
                <small class="member-modal__error">Informe a senha.</small>
              }
              @if (hasError('password', 'minlength')) {
                <small class="member-modal__error">A senha precisa ter ao menos 8 caracteres.</small>
              }
            </label>

            <label>
              <span>Confirmar senha</span>
              <input type="password" formControlName="passwordConfirmation" placeholder="Repita a senha" />
              @if (hasError('passwordConfirmation', 'required')) {
                <small class="member-modal__error">Confirme a senha.</small>
              }
              @if (hasError('passwordConfirmation', 'mismatch')) {
                <small class="member-modal__error">A confirmação deve ser igual à senha.</small>
              }
            </label>
          </div>
        }

        <div class="member-modal__grid">
          <label>
            <span>Categoria</span>
            <select formControlName="category" (change)="onCategoryChange($event)">
              <option value="child">Criança</option>
              <option value="volunteer">Voluntário</option>
              <option value="collaborator">Colaborador</option>
            </select>
          </label>

          <label>
            <span>Perfil no Portal</span>
            <select formControlName="portalRole">
              <option value="none">Sem perfil</option>
              <option value="manager" [disabled]="isChildCategory() || !isEditing()">Gestor</option>
              <option value="publisher" [disabled]="isChildCategory()">Publicador</option>
            </select>
          </label>
        </div>
      }

      <label>
        <span>Observações (Opcional)</span>
        <textarea rows="3" formControlName="notes" placeholder="Informações adicionais..."></textarea>
      </label>

      @if (formErrorMessage(); as errorMessage) {
        <p class="member-modal__form-error" role="alert">{{ errorMessage }}</p>
      }

      <footer class="member-modal__actions">
        <button type="button" class="member-modal__btn member-modal__btn--ghost" (click)="cancel.emit()">Cancelar</button>
        @if (isUsersSection() && isEditing()) {
          <button
            type="button"
            class="member-modal__btn member-modal__btn--danger"
            [disabled]="!canDeleteUser()"
            [attr.aria-disabled]="!canDeleteUser()"
            [title]="isProtectedDefaultUser() ? 'Usuário administrador padrão não pode ser excluído.' : null"
            (click)="requestDeleteUser()"
          >
            Excluir Usuário
          </button>
        }
        <button type="submit" class="member-modal__btn member-modal__btn--primary member-modal__btn--full-width">{{ submitLabel() }}</button>
      </footer>
    </form>
  </section>
</div>

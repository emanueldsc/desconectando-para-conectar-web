<article class="member-card" [class.member-card--buyer]="isBuyer()" [attr.aria-label]="(isBuyer() ? 'Membro' : 'Usuário') + ' cadastrado'">
  @if (!isBuyer()) {
    <div class="member-card__icon">
      <mat-icon aria-hidden="true">{{ iconName() }}</mat-icon>
    </div>
  }

  <div class="member-card__content">
    <p class="member-card__name">{{ member().fullName }}</p>

    <div class="member-card__meta">
      @if (!isBuyer()) {
        <span class="member-card__chip">{{ categoryLabel() }}</span>
      }
      <span class="member-card__contact">
        <mat-icon aria-hidden="true">call</mat-icon>
        {{ member().phone }}
      </span>
    </div>

    @if (isBuyer() && member().address) {
      <p class="member-card__address">{{ member().address }}</p>
    }

    @if (!isBuyer()) {
      <span class="member-card__role">{{ roleLabel() }}</span>
    }

    @if (canManageMemberNote()) {
      <div class="member-card__note-block">
        <label class="member-card__note-label" [attr.for]="'member-note-' + member().id">Observação interna</label>
        <textarea
          class="member-card__note-input"
          [id]="'member-note-' + member().id"
          [value]="noteDraft()"
          (input)="onNoteInput($event)"
          [disabled]="savingNote()"
          placeholder="Adicione uma observação rápida sobre este membro"
          rows="2"
        ></textarea>
        <button
          type="button"
          class="member-card__note-save"
          [disabled]="!hasChangedNote() || savingNote()"
          (click)="submitNote()"
        >
          {{ savingNote() ? 'Salvando...' : 'Salvar observação' }}
        </button>
      </div>
    }
  </div>

  @if (canEditUser()) {
    <button type="button" class="member-card__more" [attr.aria-label]="'Editar ' + entityLabel()" (click)="requestEdit()">
      <mat-icon aria-hidden="true">edit</mat-icon>
    </button>
  }
</article>

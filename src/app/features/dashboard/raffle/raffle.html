<div class="raffle-page">
	@if (drawError()) {
		<p class="raffle-page__error" role="alert">{{ drawError() }}</p>
	}

	@if (view() === 'empty') {
		<dashboard-raffle-empty-state (create)="openCreate()"></dashboard-raffle-empty-state>
	}

	@if (view() === 'list') {
		<dashboard-raffle-list
			[raffles]="raffles()"
			[search]="search()"
			[filter]="filter()"
			(searchChange)="search.set($event)"
			(filterChange)="filter.set($event)"
			(create)="openCreate()"
			(details)="openDetails($event)"
			(edit)="openEdit($event)"
			(delete)="deleteRaffle($event)"
			(draw)="openDraw($event)"
		></dashboard-raffle-list>
	}

	@if (view() === 'create') {
		<dashboard-raffle-create-form
			[editingRaffle]="editingRaffle()"
			(cancel)="backToList()"
			(save)="saveRaffle($event)"
		></dashboard-raffle-create-form>
	}

	@if (view() === 'details' && detailsRaffle(); as raffleDetails) {
		<dashboard-raffle-details
			[raffle]="raffleDetails"
			(back)="backToList()"
			(edit)="openEdit($event)"
			(delete)="deleteRaffle($event)"
			(draw)="openDraw($event)"
		></dashboard-raffle-details>
	}

	@if (drawRaffle(); as raffleToDraw) {
		<dashboard-raffle-draw-confirm
			[raffle]="raffleToDraw"
			[loading]="isDrawing()"
			[errorMessage]="drawError()"
			(cancel)="closeDraw()"
			(confirm)="confirmDraw()"
		></dashboard-raffle-draw-confirm>
	}
</div>

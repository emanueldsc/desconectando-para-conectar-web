<section class="create-raffle">
  <header class="create-raffle__header">
    <div class="create-raffle__badge" aria-hidden="true">
      <mat-icon>confirmation_number</mat-icon>
    </div>
    <div>
      <h2>{{ heading() }}</h2>
      <p>{{ subtitle() }}</p>
    </div>
  </header>

  <form class="create-raffle__form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="create-raffle__field">
      <span>Título da Rifa</span>
      <input type="text" formControlName="title" placeholder="Ex: Rifa Solidária da Capela" />
    </label>

    <label class="create-raffle__field">
      <span>Descrição</span>
      <textarea rows="3" formControlName="description" placeholder="Conte a história por trás desta iniciativa..."></textarea>
    </label>

    <div class="create-raffle__grid">
      <label class="create-raffle__field">
        <span>Início do Intervalo</span>
        <input type="number" formControlName="rangeStart" />
      </label>
      <label class="create-raffle__field">
        <span>Fim do Intervalo</span>
        <input type="number" formControlName="rangeEnd" />
      </label>
    </div>

    <label class="create-raffle__field">
      <span>Valor por Bilhete (R$)</span>
      <input type="number" step="0.01" formControlName="ticketPrice" />
    </label>

    <div class="create-raffle__actions">
      <button type="button" class="create-raffle__cancel" (click)="cancel.emit()">Cancelar</button>
      <button type="submit" class="create-raffle__submit">
        <mat-icon aria-hidden="true">add_circle</mat-icon>
        {{ editingRaffle() ? 'Salvar Alterações' : 'Criar Rifa' }}
      </button>
    </div>
  </form>
</section>

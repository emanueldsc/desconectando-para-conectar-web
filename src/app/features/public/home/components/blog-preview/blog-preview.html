<section class="blog-preview" aria-labelledby="blog-preview-title">
  <div class="blog-preview__inner">
    <h2 class="blog-preview__title" id="blog-preview-title">Histórias que Conectam</h2>

    <ul class="blog-preview__grid" role="list">
      @for (post of posts; track post.id) {
        <li>
          <blog-card [post]="post" />
        </li>
      }
    </ul>
  </div>
</section>

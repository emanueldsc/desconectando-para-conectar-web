<mat-drawer-container class="app-shell" [hasBackdrop]="true">
  <mat-drawer #appSidenav class="app-sidenav" mode="over" position="start">
    <div class="app-sidenav__header">
      <div class="app-sidenav__brand-block">
        <p class="app-sidenav__eyebrow">Navegacao</p>
        <h2 class="app-sidenav__title">Desconectando<br />para Conectar</h2>
      </div>

      <button
        type="button"
        mat-icon-button
        class="app-sidenav__close-btn"
        aria-label="Fechar menu de navegacao"
        (click)="appSidenav.close()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="app-sidenav__quick-actions" aria-label="Atalhos rapidos">
      <button type="button" class="app-sidenav__quick-chip" (click)="appSidenav.close()" routerLink="/public/home">
        <mat-icon>home</mat-icon>
        <span>Inicio</span>
      </button>
      <button type="button" class="app-sidenav__quick-chip" (click)="appSidenav.close()" routerLink="/public/blog">
        <mat-icon>auto_stories</mat-icon>
        <span>Blog</span>
      </button>
    </div>

    <nav class="app-sidenav__nav" aria-label="Navegacao principal">
      @for (item of menuItems(); track item.id) {
        <a
          [routerLink]="item.route"
          routerLinkActive="app-sidenav__link--active"
          (click)="appSidenav.close()"
          class="app-sidenav__link"
        >
          <span class="app-sidenav__link-icon" aria-hidden="true">
            <mat-icon>{{ menuIcon(item.id) }}</mat-icon>
          </span>
          <span class="app-sidenav__link-content">
            <span class="app-sidenav__link-label">{{ item.label }}</span>
            <span class="app-sidenav__link-hint">Acessar {{ item.label.toLowerCase() }}</span>
          </span>
          <mat-icon class="app-sidenav__link-arrow" aria-hidden="true">chevron_right</mat-icon>
        </a>
      }
    </nav>

    @if (menuError(); as error) {
      <p class="app-sidenav__error">{{ error }}</p>
    }

    <div class="app-sidenav__footer">
      <a routerLink="/public/raffles" (click)="appSidenav.close()" class="app-sidenav__cta">Quero participar da rifa</a>
    </div>
  </mat-drawer>

  <mat-drawer-content class="app-shell__content">
    <top-bar (menuClick)="appSidenav.toggle()" [menuItems]="menuItems()" />

    <main class="main-content">
      @if (menuLoading()) {
        <p class="menu-loading">Carregando menu...</p>
      }

      <router-outlet />
    </main>

    <footer>
      <footer-content />
    </footer>
  </mat-drawer-content>
</mat-drawer-container>

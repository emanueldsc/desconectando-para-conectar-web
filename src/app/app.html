<mat-drawer-container class="app-shell" [hasBackdrop]="true">
  <mat-drawer #appSidenav class="app-sidenav" mode="over" position="start">
    <nav class="app-sidenav__nav" aria-label="Navegacao principal">
      @for (item of menuItems(); track item.id) {
        <a [routerLink]="item.route" (click)="appSidenav.close()">{{ item.label }}</a>
      }
    </nav>

    @if (menuError(); as error) {
      <p class="app-sidenav__error">{{ error }}</p>
    }
  </mat-drawer>

  <mat-drawer-content class="app-shell__content">
    <top-bar (menuClick)="appSidenav.toggle()" [menuItems]="menuItems()" />

    <main class="main-content">
      @if (menuLoading()) {
        <p class="menu-loading">Carregando menu...</p>
      }

      <router-outlet />
    </main>

    <footer>
      <footer-content />
    </footer>
  </mat-drawer-content>
</mat-drawer-container>
